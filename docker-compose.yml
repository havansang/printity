
services:
  # MongoDB service
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  # Backend service
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example  # Chỉ định file môi trường cho backend
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    volumes:
      - ./uploads:/app/uploads

  # Frontend service
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '80:80'

volumes:
  mongo_data: